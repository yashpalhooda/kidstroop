<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enarv - Find Your Next Favorite Book</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .category-card:hover { transform: translateY(-2px); transition: all 0.2s; }
    </style>
</head>
<body class="bg-white text-gray-900">

    <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-100">
        <div class="flex items-center gap-10">
            <div class="text-3xl font-black italic text-blue-600 tracking-tighter">ENARV</div>
            
            <div class="hidden lg:flex items-center gap-6 text-gray-500 font-semibold">
                <a href="#" class="text-blue-600 border-b-2 border-blue-600 pb-1">Home</a>
                <a href="#" class="hover:text-blue-600">Feed</a>
                <a href="#" class="hover:text-blue-600">Book tracker</a>
                <a href="#" class="hover:text-blue-600">Clubs</a>
                <a href="#" class="hover:text-blue-600">Blog</a>
                <a href="#" class="hover:text-blue-600">Support</a>
            </div>
        </div>

        <div class="flex items-center gap-5">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 text-gray-400 w-5 h-5"></i>
                <input type="text" placeholder="Search Book" class="bg-gray-100 pl-10 pr-4 py-2 rounded-full w-64 focus:outline-none focus:ring-2 focus:ring-blue-100">
            </div>
            <div class="flex items-center gap-4 text-gray-600">
                <i data-lucide="bell" class="w-6 h-6 cursor-pointer"></i>
                <i data-lucide="message-square" class="w-6 h-6 cursor-pointer"></i>
                <i data-lucide="bookmark" class="w-6 h-6 cursor-pointer"></i>
                <i data-lucide="heart" class="w-6 h-6 cursor-pointer"></i>
                <i data-lucide="shopping-cart" class="w-6 h-6 cursor-pointer"></i>
                <i data-lucide="user" class="w-6 h-6 cursor-pointer bg-gray-100 p-1 rounded-full"></i>
                <i data-lucide="log-out" class="w-6 h-6 cursor-pointer"></i>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-8 py-16 flex flex-col md:flex-row items-center justify-between">
        <div class="md:w-1/2">
            <h1 class="text-6xl font-extrabold leading-[1.1] text-gray-900">
                Find Your Next<br>Favorite Book<br>Fast!
            </h1>
            <p class="text-gray-500 mt-6 text-lg">Discover new worlds at your fingertips.</p>
            <button class="mt-8 bg-blue-600 text-white px-10 py-4 rounded-full font-bold shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all">
                Shop now
            </button>
        </div>

        <div class="md:w-1/2 flex justify-center mt-12 md:mt-0 relative">
            <div class="relative w-64 h-96 bg-gray-900 rounded-sm shadow-2xl overflow-hidden transform rotate-2">
                <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f?auto=format&fit=crop&q=80&w=600" alt="Book Cover" class="object-cover w-full h-full opacity-80">
                <div class="absolute inset-0 p-6 flex flex-col justify-center text-center text-white">
                    <p class="text-[10px] uppercase tracking-widest mb-2">Angelina Gloss</p>
                    <h2 class="text-4xl font-light tracking-tighter">MEMORY</h2>
                    <p class="text-[8px] mt-4 opacity-70">THE IMPERFECTIONS OF MEMORY</p>
                </div>
            </div>
        </div>
    </header>

    <section class="max-w-7xl mx-auto px-8 py-10">
        <h2 class="text-2xl font-bold mb-8">Book Category</h2>
        <div class="grid grid-cols-2 md:grid-cols-6 gap-4">
            <div class="category-card flex items-center justify-center gap-3 bg-gray-50 py-4 px-6 rounded-2xl cursor-pointer hover:bg-blue-50">
                <i data-lucide="globe" class="w-5 h-5 text-blue-400"></i>
                <span class="font-medium">Fiction</span>
            </div>
            <div class="category-card flex items-center justify-center gap-3 bg-gray-50 py-4 px-6 rounded-2xl cursor-pointer hover:bg-blue-50">
                <i data-lucide="atom" class="w-5 h-5 text-blue-400"></i>
                <span class="font-medium">Biography</span>
            </div>
            <div class="category-card flex items-center justify-center gap-3 bg-gray-50 py-4 px-6 rounded-2xl cursor-pointer hover:bg-blue-50">
                <i data-lucide="scroll-text" class="w-5 h-5 text-blue-400"></i>
                <span class="font-medium">Thriller</span>
            </div>
            <div class="category-card flex items-center justify-center gap-3 bg-gray-50 py-4 px-6 rounded-2xl cursor-pointer hover:bg-blue-50">
                <i data-lucide="book-open" class="w-5 h-5 text-blue-400"></i>
                <span class="font-medium">Poetry</span>
            </div>
            <div class="category-card flex items-center justify-center gap-3 bg-gray-50 py-4 px-6 rounded-2xl cursor-pointer hover:bg-blue-50">
                <i data-lucide="telescope" class="w-5 h-5 text-blue-400"></i>
                <span class="font-medium">History</span>
            </div>
            <div class="category-card flex items-center justify-center gap-3 bg-gray-50 py-4 px-6 rounded-2xl cursor-pointer hover:bg-blue-50">
                <i data-lucide="award" class="w-5 h-5 text-blue-400"></i>
                <span class="font-medium">Romance</span>
            </div>
        </div>
    </section>

    <section class="max-w-7xl mx-auto px-8 py-10">
        <h2 class="text-2xl font-bold mb-8">Books</h2>
        <div id="book-grid" class="grid grid-cols-2 md:grid-cols-5 gap-6">
            </div>
    </section>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // Sample Data for Books
        const books = [
            { title: "Design Systems", author: "John Smith", price: "$24.00" },
            { title: "Modern Web", author: "Jane Doe", price: "$19.00" },
            { title: "UI Patterns", author: "Alex Reed", price: "$32.00" },
            { title: "Creative Code", author: "Sam Hill", price: "$28.00" },
            { title: "Digital Art", author: "Chris Lee", price: "$21.00" }
        ];

        const grid = document.getElementById('book-grid');

        // Loop to create book items
        books.forEach(book => {
            const card = `
                <div class="group cursor-pointer">
                    <div class="relative bg-gray-200 aspect-[3/4] rounded-xl overflow-hidden shadow-sm">
                        <img src="https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=400" class="w-full h-full object-cover group-hover:scale-105 transition duration-300">
                        <div class="absolute top-3 right-3 bg-white p-1.5 rounded-full shadow-md">
                            <i data-lucide="heart" class="w-4 h-4 text-gray-400"></i>
                        </div>
                    </div>
                    <div class="mt-4">
                        <h4 class="font-bold text-gray-900 truncate">${book.title}</h4>
                        <p class="text-sm text-gray-500">${book.author}</p>
                        <p class="mt-1 font-bold text-blue-600">${book.price}</p>
                    </div>
                </div>
            `;
            grid.innerHTML += card;
        });

        // Re-run icons for dynamically added content
        lucide.createIcons();
    </script>
</body>
</html>
